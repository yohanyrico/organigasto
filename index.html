<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OrganíGasto</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OrganíGasto">
<meta name="theme-color" content="#0f0e17">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1043/1043431.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --accent: #ff6b35;
    --accent2: #f7c948;
    --green: #4ecb71;
    --red: #ff4d6d;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(78,203,113,0.05) 0%, transparent 50%);
    user-select: none;
    -webkit-user-select: none;
  }

  header { padding: 2.5rem 1.5rem 1rem; text-align: center; }
  .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; }

  .container { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 6rem; }

  /* INCOME CARD */
  .income-card {
    background: linear-gradient(135deg, var(--accent) 0%, #ff8c00 100%);
    border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
  }
  .income-amount-edit {
    background: none; border: none; color: white; font-size: 2.5rem; font-weight: 700;
    font-family: 'Playfair Display', serif; outline: none; width: 100%; border-bottom: 2px dashed rgba(255,255,255,0.4);
  }
  .income-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.85; }

  /* SUMMARY & PROGRESS */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .summary-box { background: var(--card); border-radius: 14px; padding: 1rem; border: 1px solid var(--border); text-align: center; }
  .s-value { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .progress-wrap { background: var(--card); border-radius: 14px; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
  .progress-bar-bg { height: 8px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .progress-bar-fill.over { background: var(--red); }

  /* LIST */
  .expense-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .expense-item {
    background: var(--card); border-radius: 14px; padding: 1rem; border: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.75rem;
  }
  .expense-emoji { font-size: 1.4rem; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; }
  .expense-info { flex: 1; }
  .expense-quincenal { color: var(--accent2); font-weight: 700; font-family: 'Playfair Display', serif; }

  /* FORM & MODAL */
  .add-section { overflow: hidden; transition: all 0.3s ease; }
  .add-section.hidden { max-height: 0; opacity: 0; margin-bottom: 0; }
  .add-section.visible { max-height: 800px; opacity: 1; margin-bottom: 1.5rem; }
  .form-input, .form-select {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.7rem; color: var(--text); width: 100%; margin-top: 5px; outline: none;
  }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 100; align-items: flex-end; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 1.5rem; width: 100%; }

  .fab {
    position: fixed; bottom: 1.5rem; right: 1.5rem; width: 60px; height: 60px;
    background: var(--accent); border: none; border-radius: 50%; color: white;
    font-size: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 90;
  }
  .fab.open { transform: rotate(45deg); background: var(--red); }
  
  .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
  .emoji-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 1.2rem; }
  .emoji-btn.selected { border-color: var(--accent); background: rgba(255,107,53,0.1); }
</style>
</head>
<body>

<header>
  <div class="logo">Organi<span>Gasto</span></div>
  <div class="subtitle">Control Quincenal</div>
</header>

<div class="container">
  <div class="income-card">
    <div class="income-label">Presupuesto de la Quincena</div>
    <div class="income-amount">
      $<input class="income-amount-edit" id="budgetAmount" type="number" value="4000000" oninput="render()">
    </div>
    <div id="incomeMonthly" style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;"></div>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div style="font-size: 0.7rem; color: var(--muted);">GASTOS</div>
      <div class="s-value" id="totalExpenses" style="color: var(--red);">$0</div>
    </div>
    <div class="summary-box">
      <div style="font-size: 0.7rem; color: var(--muted);">LIBRE</div>
      <div class="s-value" id="remaining" style="color: var(--green);">$0</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
      <span>Uso del presupuesto</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="add-section hidden" id="addSection">
    <div style="background: var(--card); padding: 1.2rem; border-radius: 18px; border: 1px solid var(--border);">
      <h3 style="margin-bottom: 1rem; color: var(--accent);">Nuevo Gasto</h3>
      <input class="form-input" id="newName" placeholder="Nombre (Ej: Arriendo)">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
        <input class="form-input" id="newAmount" type="number" placeholder="Valor $">
        <select class="form-select" id="newFreq">
          <option value="quincenal">Es Quincenal</option>
          <option value="mensual">Mensual (Dividir /2)</option>
        </select>
      </div>
      <div class="emoji-row" id="emojiRow" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
        </div>
      <button onclick="addExpense()" style="width:100%; padding: 1rem; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: bold;">AGREGAR GASTO</button>
    </div>
  </div>

  <div style="display:flex; align-items: center; gap: 10px; margin-bottom: 1rem; color: var(--muted);">
    <span style="font-weight: bold; font-size: 0.9rem;">MIS GASTOS</span>
    <div style="flex:1; height: 1px; background: var(--border);"></div>
  </div>
  <div class="expense-list" id="expenseList"></div>
</div>

<button class="fab" id="fab" onclick="toggleAddForm()">+</button>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 style="margin-bottom: 1rem;">Editar Gasto</h3>
    <input type="hidden" id="editId">
    <input class="form-input" id="editName">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
      <input class="form-input" id="editAmount" type="number">
      <select class="form-select" id="editFreq">
        <option value="quincenal">Quincenal</option>
        <option value="mensual">Mensual</option>
      </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem;">
      <button onclick="closeModal()" style="padding: 1rem; border-radius: 12px; border: none; background: #333; color: white;">Cancelar</button>
      <button onclick="saveEdit()" style="padding: 1rem; border-radius: 12px; border: none; background: var(--green); color: #000; font-weight: bold;">Guardar</button>
    </div>
  </div>
</div>

<script>
// --- MEMORIA (LOCALSTORAGE) ---
let expenses = JSON.parse(localStorage.getItem('og_gastos')) || [];
let nextId = parseInt(localStorage.getItem('og_nextId')) || 1;
let selectedEmoji = '💡';
const EMOJIS = ['💡','🌐','🔥','🏫','💳','🛒','🚌','🏠','📱','🏥','🎓','⛽'];

function saveData() {
  localStorage.setItem('og_gastos', JSON.stringify(expenses));
  localStorage.setItem('og_budget', document.getElementById('budgetAmount').value);
  localStorage.setItem('og_nextId', nextId);
}

function loadBudget() {
  const saved = localStorage.getItem('og_budget');
  if(saved) document.getElementById('budgetAmount').value = saved;
}

// --- LÓGICA DE LA APP ---
function fmt(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }

function calcQ(e) {
  return e.freq === 'mensual' ? e.amount / 2 : e.amount;
}

function render() {
  const budget = parseFloat(document.getElementById('budgetAmount').value) || 0;
  document.getElementById('incomeMonthly').textContent = `Total mensual: ${fmt(budget * 2)}`;

  const total = expenses.reduce((s, e) => s + calcQ(e), 0);
  const rem = budget - total;
  const pct = budget > 0 ? (total / budget) * 100 : 0;

  document.getElementById('totalExpenses').textContent = fmt(total);
  document.getElementById('remaining').textContent = fmt(rem);
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('progressBar').className = 'progress-bar-fill' + (pct > 100 ? ' over' : '');

  const list = document.getElementById('expenseList');
  if (expenses.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--muted);">No hay gastos. Toca el + para empezar.</div>';
  } else {
    list.innerHTML = expenses.map(e => `
      <div class="expense-item">
        <div class="expense-emoji">${e.emoji}</div>
        <div class="expense-info">
          <div style="font-weight:bold;">${e.name}</div>
          <div style="font-size:0.75rem; color:var(--muted);">${e.freq} • ${fmt(e.amount)}</div>
        </div>
        <div style="text-align:right; margin-right: 10px;">
          <div class="expense-quincenal">${fmt(calcQ(e))}</div>
        </div>
        <div style="display:flex; flex-direction:column; gap: 5px;">
          <button class="btn-icon" onclick="openEdit(${e.id})">✏️</button>
          <button class="btn-icon" onclick="deleteExpense(${e.id})">🗑️</button>
        </div>
      </div>
    `).join('');
  }
  saveData();
}

function toggleAddForm() {
  const sec = document.getElementById('addSection');
  const fab = document.getElementById('fab');
  sec.classList.toggle('hidden');
  sec.classList.toggle('visible');
  fab.classList.toggle('open');
}

function addExpense() {
  const name = document.getElementById('newName').value;
  const amount = parseFloat(document.getElementById('newAmount').value);
  const freq = document.getElementById('newFreq').value;
  if(!name || !amount) return;

  expenses.push({ id: nextId++, name, amount, freq, emoji: selectedEmoji });
  document.getElementById('newName').value = '';
  document.getElementById('newAmount').value = '';
  toggleAddForm();
  render();
}

function deleteExpense(id) {
  if(confirm('¿Eliminar este gasto?')) {
    expenses = expenses.filter(e => e.id !== id);
    render();
  }
}

function openEdit(id) {
  const e = expenses.find(x => x.id === id);
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = e.name;
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editFreq').value = e.freq;
  document.getElementById('editModal').classList.add('open');
}

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const e = expenses.find(x => x.id === id);
  e.name = document.getElementById('editName').value;
  e.amount = parseFloat(document.getElementById('editAmount').value);
  e.freq = document.getElementById('editFreq').value;
  closeModal();
  render();
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

// Emojis
const row = document.getElementById('emojiRow');
EMOJIS.forEach(em => {
  const btn = document.createElement('button');
  btn.className = 'emoji-btn' + (em === '💡' ? ' selected' : '');
  btn.textContent = em;
  btn.onclick = () => {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = em;
  };
  row.appendChild(btn);
});

loadBudget();
render();
</script>
</body>
</html>
