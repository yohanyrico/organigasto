<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrganíGasto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --accent: #ff6b35;
    --accent2: #f7c948;
    --green: #4ecb71;
    --red: #ff4d6d;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(78,203,113,0.05) 0%, transparent 50%);
  }

  header {
    padding: 2rem 1.5rem 1rem;
    text-align: center;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 1rem auto 0;
    border-radius: 2px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .logo span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 6rem; }

  /* INCOME CARD */
  .income-card {
    background: linear-gradient(135deg, var(--accent) 0%, #ff8c00 100%);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .income-card::before {
    content: '₡';
    position: absolute;
    right: -10px;
    top: -20px;
    font-size: 8rem;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    opacity: 0.1;
    color: white;
  }

  .income-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.85;
    margin-bottom: 0.3rem;
  }

  .income-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .income-name-edit {
    background: none;
    border: none;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    outline: none;
    cursor: pointer;
    border-bottom: 1px dashed rgba(255,255,255,0.5);
    min-width: 10px;
  }

  .income-amount {
    font-size: 2.5rem;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .income-amount-edit {
    background: none;
    border: none;
    color: white;
    font-size: 2.5rem;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    outline: none;
    width: 100%;
    border-bottom: 2px dashed rgba(255,255,255,0.4);
  }

  .income-period {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 0.3rem;
  }

  /* SUMMARY */
  .summary-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .summary-box {
    background: var(--card);
    border-radius: 14px;
    padding: 1rem;
    border: 1px solid var(--border);
    text-align: center;
  }

  .summary-box .s-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .summary-box .s-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .summary-box.red .s-value { color: var(--red); }
  .summary-box.green .s-value { color: var(--green); }

  /* SECTION */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* EXPENSE ITEM */
  .expense-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }

  .expense-item {
    background: var(--card);
    border-radius: 14px;
    padding: 1rem 1rem;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: all 0.2s ease;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .expense-item:hover { border-color: rgba(255,107,53,0.25); }

  .expense-emoji {
    font-size: 1.4rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .expense-info { flex: 1; min-width: 0; }

  .expense-name {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .expense-detail {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }

  .expense-amount-col { text-align: right; flex-shrink: 0; }

  .expense-quincenal {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .expense-original {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .expense-actions {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex-shrink: 0;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    font-size: 0.9rem;
    opacity: 0.5;
    transition: all 0.15s;
    line-height: 1;
  }

  .btn-icon:hover { opacity: 1; background: rgba(255,255,255,0.08); }
  .btn-icon.delete:hover { background: rgba(255,77,109,0.15); color: var(--red); }

  /* ADD FORM */
  .add-form {
    background: var(--card);
    border-radius: 18px;
    padding: 1.25rem;
    border: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--accent);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 0.6rem; }
  .form-grid.full { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 0.3rem; }

  .form-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .form-input, .form-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--card); }

  .btn-add {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.4rem;
  }

  .btn-add:hover { background: #ff8c00; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* MODAL EDIT */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
    border-top: 1px solid var(--border);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
  }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .btn-cancel {
    background: rgba(255,255,255,0.07);
    color: var(--text);
    border: none;
    border-radius: 12px;
    padding: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-save {
    background: var(--green);
    color: #0f0e17;
    border: none;
    border-radius: 12px;
    padding: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--card);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .progress-bar-bg {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  }

  .progress-bar-fill.over { background: linear-gradient(90deg, var(--red), #ff006e); }

  /* TOGGLE ADD FORM */
  .fab {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 56px;
    height: 56px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    transition: all 0.2s;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(255,107,53,0.5); }
  .fab.open { background: var(--red); transform: rotate(45deg); }

  .add-section { overflow: hidden; transition: all 0.3s ease; }
  .add-section.hidden { max-height: 0; opacity: 0; }
  .add-section.visible { max-height: 600px; opacity: 1; }

  /* EMOJI PICKER */
  .emoji-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .emoji-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .emoji-btn:hover, .emoji-btn.selected { background: rgba(255,107,53,0.2); border-color: var(--accent); }

  .no-expenses {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 2rem;
  }

  /* Frequency badge */
  .freq-badge {
    display: inline-block;
    background: rgba(247,201,72,0.15);
    color: var(--accent2);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Organi<span>Gasto</span></div>
  <div class="subtitle">Organización Quincenal · Pesos COP</div>
</header>

<div class="container">

  <!-- INCOME -->
  <div class="income-card">
    <div class="income-label">Ingreso quincenal</div>
    <div class="income-name">
      ✏️ <input class="income-name-edit" id="budgetName" value="Mi Quincena" maxlength="30" title="Toca para editar el nombre">
    </div>
    <div class="income-amount">
      $<input class="income-amount-edit" id="budgetAmount" type="number" value="4000000" oninput="render()">
    </div>
    <div class="income-period" id="incomeMonthly"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row">
    <div class="summary-box red">
      <div class="s-label">Total gastos</div>
      <div class="s-value" id="totalExpenses">$0</div>
    </div>
    <div class="summary-box green">
      <div class="s-label">Disponible</div>
      <div class="s-value" id="remaining">$0</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span>Presupuesto usado</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-title">Mis gastos</div>
  <div class="expense-list" id="expenseList">
    <div class="no-expenses">No hay gastos aún. Agrega uno con el botón + 👇</div>
  </div>

  <!-- ADD FORM (toggled) -->
  <div class="add-section hidden" id="addSection">
    <div class="add-form">
      <div class="form-title">➕ Nuevo gasto</div>

      <div class="form-grid full">
        <div class="form-group">
          <label class="form-label">Nombre del gasto</label>
          <input class="form-input" id="newName" placeholder="Ej: Arriendo, Netflix…" maxlength="40">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Valor ($)</label>
          <input class="form-input" id="newAmount" type="number" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Frecuencia</label>
          <select class="form-select" id="newFreq">
            <option value="quincenal">Quincenal</option>
            <option value="mensual">Mensual ÷ 2</option>
            <option value="semanal_x2">Semanal × 2</option>
            <option value="fijo">Fijo quincenal</option>
          </select>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:0.6rem">
        <label class="form-label">Ícono</label>
        <div class="emoji-row" id="emojiRow">
          <button class="emoji-btn selected" data-emoji="💡" onclick="selectEmoji(this)">💡</button>
          <button class="emoji-btn" data-emoji="🌐" onclick="selectEmoji(this)">🌐</button>
          <button class="emoji-btn" data-emoji="🔥" onclick="selectEmoji(this)">🔥</button>
          <button class="emoji-btn" data-emoji="🏫" onclick="selectEmoji(this)">🏫</button>
          <button class="emoji-btn" data-emoji="💳" onclick="selectEmoji(this)">💳</button>
          <button class="emoji-btn" data-emoji="🛒" onclick="selectEmoji(this)">🛒</button>
          <button class="emoji-btn" data-emoji="🚌" onclick="selectEmoji(this)">🚌</button>
          <button class="emoji-btn" data-emoji="🏠" onclick="selectEmoji(this)">🏠</button>
          <button class="emoji-btn" data-emoji="📱" onclick="selectEmoji(this)">📱</button>
          <button class="emoji-btn" data-emoji="🏥" onclick="selectEmoji(this)">🏥</button>
          <button class="emoji-btn" data-emoji="🎓" onclick="selectEmoji(this)">🎓</button>
          <button class="emoji-btn" data-emoji="⛽" onclick="selectEmoji(this)">⛽</button>
        </div>
      </div>

      <button class="btn-add" onclick="addExpense()">Agregar gasto</button>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="toggleAddForm()">+</button>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Editar gasto</div>
    <input type="hidden" id="editId">
    <div class="form-grid full" style="margin-bottom:0.6rem">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="editName">
      </div>
    </div>
    <div class="form-grid" style="margin-bottom:0.6rem">
      <div class="form-group">
        <label class="form-label">Valor ($)</label>
        <input class="form-input" id="editAmount" type="number">
      </div>
      <div class="form-group">
        <label class="form-label">Frecuencia</label>
        <select class="form-select" id="editFreq">
          <option value="quincenal">Quincenal</option>
          <option value="mensual">Mensual ÷ 2</option>
          <option value="semanal_x2">Semanal × 2</option>
          <option value="fijo">Fijo quincenal</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['💡','🌐','🔥','🏫','💳','🛒','🚌','🏠','📱','🏥','🎓','⛽'];
let selectedEmoji = '💡';

// Default expenses based on the notebook
let expenses = [
  { id: 1, name: 'Luz', amount: 2000000, freq: 'mensual', emoji: '💡' },

];

let nextId = 10;

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

function calcQuincenal(expense) {
  const a = expense.amount;
  switch(expense.freq) {
    case 'quincenal': return a;
    case 'mensual': return a / 2;
    case 'semanal_x2': return a * 2;
    case 'fijo': return a;
    default: return a;
  }
}

function freqLabel(freq) {
  const map = { quincenal: 'Quincenal', mensual: 'Mensual ÷2', semanal_x2: 'Semanal ×2', fijo: 'Fijo' };
  return map[freq] || freq;
}

function render() {
  const budget = parseFloat(document.getElementById('budgetAmount').value) || 0;
  document.getElementById('incomeMonthly').textContent =
    '≈ ' + fmt(budget * 2) + ' al mes';

  const total = expenses.reduce((s, e) => s + calcQuincenal(e), 0);
  const rem = budget - total;
  const pct = budget > 0 ? Math.min((total / budget) * 100, 100) : 0;

  document.getElementById('totalExpenses').textContent = fmt(total);
  const remEl = document.getElementById('remaining');
  remEl.textContent = fmt(rem);
  remEl.style.color = rem < 0 ? 'var(--red)' : 'var(--green)';

  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  bar.className = 'progress-bar-fill' + (rem < 0 ? ' over' : '');

  const list = document.getElementById('expenseList');
  if (expenses.length === 0) {
    list.innerHTML = '<div class="no-expenses">No hay gastos aún. Agrega uno con el botón + 👇</div>';
    return;
  }

  list.innerHTML = expenses.map(e => {
    const q = calcQuincenal(e);
    return `
      <div class="expense-item" id="item-${e.id}">
        <div class="expense-emoji">${e.emoji}</div>
        <div class="expense-info">
          <div class="expense-name">${e.name}</div>
          <div class="expense-detail">
            <span class="freq-badge">${freqLabel(e.freq)}</span>
            &nbsp;${fmt(e.amount)}
          </div>
        </div>
        <div class="expense-amount-col">
          <div class="expense-quincenal">${fmt(q)}</div>
          <div class="expense-original">quincenal</div>
        </div>
        <div class="expense-actions">
          <button class="btn-icon" onclick="openEdit(${e.id})" title="Editar">✏️</button>
          <button class="btn-icon delete" onclick="deleteExpense(${e.id})" title="Eliminar">🗑</button>
        </div>
      </div>
    `;
  }).join('');
}

function toggleAddForm() {
  const sec = document.getElementById('addSection');
  const fab = document.getElementById('fab');
  const isOpen = sec.classList.contains('visible');
  sec.classList.toggle('visible', !isOpen);
  sec.classList.toggle('hidden', isOpen);
  fab.classList.toggle('open', !isOpen);
  if (!isOpen) {
    setTimeout(() => document.getElementById('newName').focus(), 100);
  }
}

function selectEmoji(btn) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEmoji = btn.dataset.emoji;
}

function addExpense() {
  const name = document.getElementById('newName').value.trim();
  const amount = parseFloat(document.getElementById('newAmount').value);
  const freq = document.getElementById('newFreq').value;

  if (!name) { document.getElementById('newName').focus(); return; }
  if (!amount || amount <= 0) { document.getElementById('newAmount').focus(); return; }

  expenses.push({ id: nextId++, name, amount, freq, emoji: selectedEmoji });
  document.getElementById('newName').value = '';
  document.getElementById('newAmount').value = '';
  render();
  toggleAddForm();
}

function deleteExpense(id) {
  const item = document.getElementById('item-' + id);
  if (item) {
    item.style.transition = 'all 0.25s ease';
    item.style.opacity = '0';
    item.style.transform = 'translateX(30px)';
    setTimeout(() => {
      expenses = expenses.filter(e => e.id !== id);
      render();
    }, 250);
  }
}

function openEdit(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = e.name;
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editFreq').value = e.freq;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const name = document.getElementById('editName').value.trim();
  const amount = parseFloat(document.getElementById('editAmount').value);
  const freq = document.getElementById('editFreq').value;
  if (!name || !amount) return;
  const e = expenses.find(x => x.id === id);
  if (e) { e.name = name; e.amount = amount; e.freq = freq; }
  closeModal();
  render();
}

document.getElementById('editModal').addEventListener('click', function(ev) {
  if (ev.target === this) closeModal();
});

document.getElementById('newAmount').addEventListener('keydown', e => {
  if (e.key === 'Enter') addExpense();
});

render();
</script>
</body>
</html>
